stages:
  - test

e2e-tests:
  stage: test

  image: mcr.microsoft.com/playwright:v1.55.0-noble

  cache:
    paths:
      - node_modules/

  script:
    - npm install -g yarn
    - yarn install --frozen-lockfile
    - yarn run e2e

  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

  when: manual #substitui o  workflow_dispatch: